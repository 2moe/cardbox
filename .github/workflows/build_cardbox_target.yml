name: Build Cardbox Target
env:
  # BUILDKIT_PROGRESS: plain
  cargo_crate_name: cardbox-target
  add_nightly_toolchain: "%w[rustup toolchain install nightly --component rust-src].run_cmd"
  using_get_command_json: "require_ci 'cardbox_target/get_command.rb'"
  panic_abort_flags: "-Zunstable-options -Cpanic=immediate-abort"

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build_cardbox_target.yml
      - .github/_ci_/cardox_target/dockerfile
  workflow_dispatch:
    inputs:
      enabled_win:
        description: "Windows"
        type: boolean
        default: true
      enabled_mac:
        description: "macOS"
        type: boolean
        default: true
      enabled_wasi:
        description: "WebAssembly System Interface"
        type: boolean
        default: true
      enabled_linux_gnu:
        description: "Linux Glibc"
        type: boolean
        default: true
      enabled_bsd:
        description: "FreeBSD + OpenBSD + NetBSD + .."
        type: boolean
        default: false
      enabled_linux_musl:
        type: boolean
        default: false

defaults:
  run:
    shell: ruby --disable=gems cinnabar/ci.rb {0}

jobs:
  prepare:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - id: set_matrix
        shell: ruby -rjson {0}
        run: | #.#
          matrix_json = [
            { target: "wasi",       enabled: ${{inputs.enabled_wasi}} },
            { target: "linux-gnu", enabled: ${{inputs.enabled_linux_gnu}} },
            { target: "linux-musl",enabled: ${{inputs.enabled_linux_musl}} },
            { target: "bsd",        enabled: ${{inputs.enabled_bsd}} },
            { target: "win",        os: "windows-latest", enabled: ${{inputs.enabled_win}} },
            { target: "mac",        os: "macos-latest",   enabled: ${{inputs.enabled_mac}} },
          ] .select { |t| t[:enabled] }
            .map    { |h| h.delete_if { |k, _| k == :enabled } }
            .map   { |h| h.merge!(os: "ubuntu-latest") if h[:os].nil? }
            .compact
            .then { {include: _1} }
            .then { JSON.dump _1 }
          file = ENV['github_output'.upcase]
          value = "matrix=#{matrix_json}\n"
          File.write(file, value, mode: "a")

  build:
    needs:
      - prepare
    strategy:
      # max-parallel: 2
      fail-fast: true
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v6

      - name: clone cinnabar
        uses: actions/checkout@v6
        with:
          repository: 2moe/cinnabar
          path: cinnabar
          ref: v0.0.9-alpha.0

      - name: build wasi
        if: matrix.target == 'wasi'
        env:
          RUSTFLAGS: ${{env.panic_abort_flags}}
        run: | #.#
          ${{env.using_get_command_json}}

          get_command("wasi_targets").each do |target|
            %w[rustup target add].push(target).run_cmd
          end
          get_command("build_wasi_arrs").each(&:run_cmd)

      - name: build linux gnu
        if: matrix.target == 'linux-gnu'
        run: | #.#
          ${{env.using_get_command_json}}
          get_command("build_linux_gnu").run_cmd

      - name: build linux musl
        if: matrix.target == 'linux-musl'
        run: | #.#
          ${{env.using_get_command_json}}
          get_command("build_linux_musl").run_cmd

      - name: zig build
        if: matrix.target == 'bsd'
        run: | #.#
          ${{env.add_nightly_toolchain}}
          ${{env.using_get_command_json}}
          get_command("zig_build").run_cmd

      - name: build win bin
        if: matrix.target == 'win'
        run: | #.#
          ${{env.using_get_command_json}}

          get_command("win_targets").each do |target|
            %w[rustup target add].push(target).run_cmd
          end
          get_command("build_win_arrs").each(&:run_cmd)

      - name: build macOS bin
        if: matrix.target == 'mac'
        run: | #.#
          ${{env.using_get_command_json}}

          get_command("mac_targets").each do |target|
            %w[rustup target add].push(target).run_cmd
          end
          get_command("build_mac_arrs").each(&:run_cmd)
